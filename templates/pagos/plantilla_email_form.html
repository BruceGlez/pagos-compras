{% extends "base.html" %}
{% block title %}Editar plantilla{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Editar plantilla {{ tpl.code }}</h5>
    <a class="btn btn-outline-secondary btn-sm" href="/plantillas-email/">Volver</a>
  </div>
  <div class="card-body">
    <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary btn-sm" type="submit">Guardar cambios</button></form>
  </div>
</div>
{% endblock %}
